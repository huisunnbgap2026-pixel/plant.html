<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>植物探索站</title>
  <style>
    body {
      margin: 0;
      padding: 24px 16px 40px;
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      color: #2f3a2f;
      background:
        radial-gradient(circle at top left, rgba(168,196,140,0.22), transparent 28%),
        radial-gradient(circle at bottom right, rgba(122,160,110,0.16), transparent 24%),
        linear-gradient(180deg, #f8f5ec 0%, #f2ede0 100%);
    }

    .wrap {
      max-width: 680px;
      margin: 0 auto;
    }

    .hero {
      margin-bottom: 18px;
      padding: 22px 22px 18px;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(90,130,94,0.94), rgba(127,162,112,0.90));
      color: #fff;
      box-shadow: 0 10px 30px rgba(69,89,63,0.12);
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -20px;
      top: -20px;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.22);
      color: #fff;
      font-size: 13px;
      margin-bottom: 10px;
      position: relative;
      z-index: 1;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.25;
      position: relative;
      z-index: 1;
    }

    .hero p {
      margin: 0;
      font-size: 14px;
      line-height: 1.7;
      color: rgba(255,255,255,0.93);
      position: relative;
      z-index: 1;
    }

    .card {
      background: rgba(255,255,255,0.94);
      border: 1px solid rgba(79,122,87,0.12);
      border-radius: 22px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(69,89,63,0.12);
      text-align: center;
    }

    .section-title {
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #6c7a67;
      margin-bottom: 10px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 22px;
      line-height: 1.35;
    }

    p {
      margin: 0 0 12px;
      line-height: 1.8;
      color: #6c7a67;
      font-size: 16px;
    }

    input, button, a {
      width: 100%;
      box-sizing: border-box;
      display: block;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 16px;
      margin-top: 12px;
      text-decoration: none;
      border: 0;
    }

    input {
      background: #fff;
      border: 1px solid #d8e4d3;
      color: #2f3a2f;
    }

    button, a.primary {
      background: linear-gradient(135deg, #4f7a57, #3e6245);
      color: #fff;
    }

    a.secondary {
      background: #e7efe4;
      color: #2f3a2f;
    }

    #manualBox { display: none; }
    #actionBox { display: none; }
    #goBtn { display: none; }

    @media (max-width: 640px) {
      body { padding: 18px 12px 32px; }
      .hero { padding: 18px 18px 16px; border-radius: 20px; }
      .hero h1 { font-size: 24px; }
      .card { padding: 18px; border-radius: 18px; }
      h2 { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="badge">植物導覽集章</div>
      <h1>植物探索站</h1>
      <p>掃描植物牌、記錄探索點數、前往植物介紹頁，展開你的植物探索旅程。</p>
    </div>

    <div class="card">
      <div class="section-title">Plant Guide</div>
      <h2>正在開啟植物介紹頁</h2>
      <p id="status">請稍候，系統正在同步你的植物導覽紀錄…</p>

      <div id="manualBox">
        <input id="phoneInput" type="text" placeholder="請輸入手機號碼">
        <button id="savePhoneBtn">送出並前往植物頁</button>
      </div>

      <div id="actionBox">
        <a id="goBtn" class="primary" href="#" target="_top">前往植物介紹頁</a>
        <a id="scanBtn" class="secondary" href="#" target="_top">繼續掃描 QR Code</a>
        <a id="queryBtn" class="secondary" href="#" target="_top">查看我的進度</a>
        <a id="rewardBtn" class="secondary" href="#" target="_top">查看可兌換獎勵</a>
        <a id="homeBtn" class="secondary" href="#" target="_top">回首頁</a>
      </div>
    </div>
  </div>

  <script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbyoFlYdQfjyJUu0onsq2DOI5wZJmRcNI2maSEbU7b5uKiSQmajfFRJGYL8OisrhhNUYKg/exec";
    const SCANNER_URL = "https://huisunnbgap2026-pixel.github.io/plant-qr-scanner/";

    function normalizePhone(phone) {
      let p = String(phone || "").replace(/\D/g, "").trim();
      if (p.length === 9 && p.startsWith("9")) p = "0" + p;
      return p;
    }

    function getParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name) || "";
    }

    function buildUrl(base, params) {
      const u = new URL(base);
      Object.keys(params).forEach(function(key) {
        u.searchParams.set(key, params[key]);
      });
      return u.toString();
    }

    const plantId = getParam("plant");
    const pageUrl = getParam("page");

    const statusEl = document.getElementById("status");
    const manualBox = document.getElementById("manualBox");
    const actionBox = document.getElementById("actionBox");
    const phoneInput = document.getElementById("phoneInput");
    const savePhoneBtn = document.getElementById("savePhoneBtn");

    const goBtn = document.getElementById("goBtn");
    const scanBtn = document.getElementById("scanBtn");
    const queryBtn = document.getElementById("queryBtn");
    const rewardBtn = document.getElementById("rewardBtn");
    const homeBtn = document.getElementById("homeBtn");

    function setActionLinks(phone) {
      const homeUrl = buildUrl(APP_URL, { mode: "home", phone: phone });
      const queryUrl = buildUrl(APP_URL, { mode: "query", phone: phone });
      const rewardUrl = buildUrl(APP_URL, { mode: "rewards", phone: phone });
      const scanUrl = buildUrl(SCANNER_URL, {
        phone: phone,
        home: homeUrl
      });

      goBtn.href = pageUrl;
      scanBtn.href = scanUrl;
      queryBtn.href = queryUrl;
      rewardBtn.href = rewardUrl;
      homeBtn.href = homeUrl;
    }

    function showActionBox() {
      actionBox.style.display = "block";
      goBtn.style.display = "block";
    }

    function goToPlantPage() {
      window.top.location.href = pageUrl;
    }

    function fetchWithTimeout(url, timeoutMs) {
      return Promise.race([
        fetch(url, {
          method: "GET",
          credentials: "omit",
          cache: "no-store"
        }),
        new Promise((_, reject) =>
          setTimeout(() => reject(new Error("timeout")), timeoutMs)
        )
      ]);
    }

    async function markPlant(phone) {
      const url = `${APP_URL}?mode=plant_mark_api&plant=${encodeURIComponent(plantId)}&phone=${encodeURIComponent(phone)}`;

      try {
        const res = await fetchWithTimeout(url, 4000);
        const data = await res.json();
        return data;
      } catch (e) {
        return { success: false, message: "network_error" };
      }
    }

    async function startWithPhone(phone) {
      setActionLinks(phone);
      showActionBox();
      statusEl.textContent = "正在同步植物導覽紀錄…";

      const result = await markPlant(phone);

      if (result && result.success) {
        statusEl.textContent = "已完成導覽紀錄，正在開啟植物介紹頁…";
        setTimeout(goToPlantPage, 250);
        return;
      }

      statusEl.textContent = "本次導覽紀錄同步較慢，請點『前往植物介紹頁』繼續；稍後可到進度頁確認是否已記錄。";
      goBtn.style.display = "block";
    }

    function start() {
      if (!plantId || !pageUrl) {
        statusEl.textContent = "缺少植物資料，請重新掃描 QR code。";
        return;
      }

      let savedPhone = normalizePhone(localStorage.getItem("savedPhone") || "");

      if (!savedPhone) {
        statusEl.textContent = "請先輸入手機號碼。";
        manualBox.style.display = "block";
        return;
      }

      startWithPhone(savedPhone);
    }

    savePhoneBtn.addEventListener("click", function () {
      const phone = normalizePhone(phoneInput.value);
      if (!phone) {
        statusEl.textContent = "請先輸入正確手機號碼。";
        return;
      }

      localStorage.setItem("savedPhone", phone);
      manualBox.style.display = "none";
      startWithPhone(phone);
    });

    start();
  </script>
</body>
</html>
