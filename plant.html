<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>植物探索導覽站</title>
  <style>
    :root{
      --bg1:#f8f6ee;
      --bg2:#eef3e7;
      --card:#ffffffee;
      --text:#263228;
      --muted:#68756a;
      --primary:#4f7a57;
      --primary-dark:#3d6244;
      --soft:#e7efe4;
      --border:rgba(79,122,87,.14);
      --shadow:0 14px 34px rgba(55,80,53,.12);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      padding:20px 14px 36px;
      font-family:"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(168,196,140,0.22), transparent 28%),
        radial-gradient(circle at bottom right, rgba(122,160,110,0.16), transparent 24%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
    }

    .wrap{
      max-width:720px;
      margin:0 auto;
    }

    .hero{
      margin-bottom:18px;
      padding:22px 22px 18px;
      border-radius:26px;
      background:linear-gradient(135deg, rgba(88,128,93,.96), rgba(134,171,117,.92));
      color:#fff;
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
    }

    .hero:before,
    .hero:after{
      content:"";
      position:absolute;
      border-radius:50%;
      background:rgba(255,255,255,.08);
    }

    .hero:before{
      width:150px;height:150px;
      top:-40px;right:-30px;
    }

    .hero:after{
      width:90px;height:90px;
      bottom:-20px;left:-10px;
    }

    .badge{
      display:inline-block;
      padding:6px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.22);
      color:#fff;
      font-size:13px;
      margin-bottom:10px;
      position:relative;
      z-index:1;
    }

    .hero h1{
      margin:0 0 8px;
      font-size:28px;
      line-height:1.2;
      position:relative;
      z-index:1;
    }

    .hero p{
      margin:0;
      font-size:14px;
      line-height:1.7;
      color:rgba(255,255,255,.94);
      position:relative;
      z-index:1;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:24px;
      padding:22px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(6px);
    }

    .section-title{
      font-size:13px;
      letter-spacing:1px;
      text-transform:uppercase;
      color:var(--muted);
      margin-bottom:8px;
    }

    h2{
      margin:0 0 10px;
      font-size:24px;
      line-height:1.3;
    }

    p{
      margin:0 0 12px;
      line-height:1.8;
      color:var(--muted);
      font-size:16px;
    }

    .status-box{
      margin-top:14px;
      padding:14px 16px;
      border-radius:18px;
      background:#f5f8f2;
      border:1px solid rgba(79,122,87,.10);
      text-align:left;
    }

    .status-label{
      font-size:13px;
      color:var(--muted);
      margin-bottom:6px;
    }

    .status-text{
      font-size:17px;
      color:var(--text);
      line-height:1.7;
    }

    .tip{
      margin-top:12px;
      font-size:14px;
      color:var(--muted);
    }

    input, button, a.btn{
      width:100%;
      display:block;
      box-sizing:border-box;
      border-radius:16px;
      padding:15px 16px;
      font-size:16px;
      margin-top:12px;
      text-decoration:none;
      border:0;
      text-align:center;
    }

    input{
      background:#fff;
      border:1px solid #d8e4d3;
      color:var(--text);
      outline:none;
    }

    input:focus{
      border-color:rgba(79,122,87,.4);
      box-shadow:0 0 0 4px rgba(79,122,87,.08);
    }

    button.primary, a.btn.primary{
      background:linear-gradient(135deg, var(--primary), var(--primary-dark));
      color:#fff;
      box-shadow:0 8px 18px rgba(79,122,87,.2);
      cursor:pointer;
    }

    a.btn.secondary{
      background:var(--soft);
      color:var(--text);
      border:1px solid rgba(79,122,87,.08);
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:8px;
    }

    #manualBox{ display:none; }
    #actionBox{ display:none; }

    @media (max-width:640px){
      body{ padding:16px 12px 30px; }
      .hero{ padding:18px 18px 16px; border-radius:22px; }
      .hero h1{ font-size:24px; }
      .card{ padding:18px; border-radius:20px; }
      h2{ font-size:21px; }
      .grid{ grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="badge">植物導覽集章</div>
      <h1>植物探索導覽站</h1>
      <p>掃描植物牌、記錄探索點數、開啟植物介紹頁，延伸你的展區探索路徑。</p>
    </div>

    <div class="card">
      <div class="section-title">Plant Guide</div>
      <h2>植物探索入口</h2>
      <p>系統會先同步本次植物導覽紀錄，再帶你前往植物介紹頁。</p>

      <div class="status-box">
        <div class="status-label">目前狀態</div>
        <div id="status" class="status-text">正在準備導覽…</div>
      </div>

      <div id="manualBox">
        <input id="phoneInput" type="text" placeholder="請輸入手機號碼">
        <button id="savePhoneBtn" class="primary">送出並開始導覽</button>
      </div>

      <div id="actionBox">
        <a id="goBtn" class="btn primary" href="#" target="_top">進入植物介紹</a>
        <div class="grid">
          <a id="scanBtn" class="btn secondary" href="#" target="_top">繼續探索植物</a>
          <a id="homeBtn" class="btn secondary" href="#" target="_top">返回展區首頁</a>
          <a id="queryBtn" class="btn secondary" href="#" target="_top">查看探索進度</a>
          <a id="rewardBtn" class="btn secondary" href="#" target="_top">查看探索獎勵</a>
        </div>
        <p class="tip">若未自動跳轉，可直接點「進入植物介紹」。從植物頁返回時，也會保留這些功能按鈕。</p>
      </div>
    </div>
  </div>

  <script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbyoFlYdQfjyJUu0onsq2DOI5wZJmRcNI2maSEbU7b5uKiSQmajfFRJGYL8OisrhhNUYKg/exec";
    const SCANNER_URL = "https://huisunnbgap2026-pixel.github.io/plant-qr-scanner/";
    const REDIRECT_DELAY_MS = 850;
    const RETURN_WINDOW_MS = 15000;

    function normalizePhone(phone) {
      let p = String(phone || "").replace(/\D/g, "").trim();
      if (p.length === 9 && p.startsWith("9")) p = "0" + p;
      return p;
    }

    function getParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name) || "";
    }

    function buildUrl(base, params) {
      const u = new URL(base);
      Object.keys(params).forEach(function(key) {
        u.searchParams.set(key, params[key]);
      });
      return u.toString();
    }

    const plantId = getParam("plant");
    const pageUrl = getParam("page");

    const statusEl = document.getElementById("status");
    const manualBox = document.getElementById("manualBox");
    const actionBox = document.getElementById("actionBox");
    const phoneInput = document.getElementById("phoneInput");
    const savePhoneBtn = document.getElementById("savePhoneBtn");

    const goBtn = document.getElementById("goBtn");
    const scanBtn = document.getElementById("scanBtn");
    const queryBtn = document.getElementById("queryBtn");
    const rewardBtn = document.getElementById("rewardBtn");
    const homeBtn = document.getElementById("homeBtn");

    const visitKey = "plant_visit_state_" + plantId;

    function setActionLinks(phone) {
      const homeUrl = buildUrl(APP_URL, { mode: "home", phone: phone });
      const queryUrl = buildUrl(APP_URL, { mode: "query", phone: phone });
      const rewardUrl = buildUrl(APP_URL, { mode: "rewards", phone: phone });
      const scanUrl = buildUrl(SCANNER_URL, {
        phone: phone,
        home: homeUrl
      });

      goBtn.href = pageUrl;
      scanBtn.href = scanUrl;
      queryBtn.href = queryUrl;
      rewardBtn.href = rewardUrl;
      homeBtn.href = homeUrl;
    }

    function showActionBox() {
      actionBox.style.display = "block";
    }

    function goToPlantPage() {
      window.location.assign(pageUrl);
    }

    function markPlant(phone) {
      const url = `${APP_URL}?mode=plant_mark_api&plant=${encodeURIComponent(plantId)}&phone=${encodeURIComponent(phone)}&_ts=${Date.now()}`;

      try {
        fetch(url, {
          method: "GET",
          mode: "no-cors",
          keepalive: true,
          cache: "no-store"
        });
      } catch (e) {}

      try {
        const img = new Image();
        img.src = url + "&beacon=1";
      } catch (e) {}
    }

    function showReturnState(phone) {
      setActionLinks(phone);
      showActionBox();
      statusEl.textContent = "你已回到植物探索站，可重新進入植物介紹，或使用下方功能按鈕。";
    }

    function shouldAutoRedirect() {
      try {
        const raw = sessionStorage.getItem(visitKey);
        if (!raw) return true;
        const ts = Number(raw) || 0;
        return (Date.now() - ts) > RETURN_WINDOW_MS;
      } catch (e) {
        return true;
      }
    }

    function rememberVisit() {
      try {
        sessionStorage.setItem(visitKey, String(Date.now()));
      } catch (e) {}
    }

    function startWithPhone(phone) {
      setActionLinks(phone);
      showActionBox();

      if (!shouldAutoRedirect()) {
        showReturnState(phone);
        return;
      }

      statusEl.textContent = "正在同步植物導覽紀錄…";
      rememberVisit();
      markPlant(phone);

      setTimeout(function() {
        statusEl.textContent = "正在開啟植物介紹頁…";
        goToPlantPage();
      }, REDIRECT_DELAY_MS);
    }

    function start() {
      if (!plantId || !pageUrl) {
        statusEl.textContent = "缺少植物資料，請重新掃描 QR code。";
        return;
      }

      const savedPhone = normalizePhone(localStorage.getItem("savedPhone") || "");
      if (!savedPhone) {
        statusEl.textContent = "請先輸入手機號碼。";
        manualBox.style.display = "block";
        return;
      }

      startWithPhone(savedPhone);
    }

    savePhoneBtn.addEventListener("click", function () {
      const phone = normalizePhone(phoneInput.value);
      if (!phone) {
        statusEl.textContent = "請先輸入正確手機號碼。";
        return;
      }

      localStorage.setItem("savedPhone", phone);
      manualBox.style.display = "none";
      startWithPhone(phone);
    });

    window.addEventListener("pageshow", function(event) {
      if (event.persisted) {
        const savedPhone = normalizePhone(localStorage.getItem("savedPhone") || "");
        if (savedPhone && plantId && pageUrl) {
          showReturnState(savedPhone);
        }
      }
    });

    start();
  </script>
</body>
</html>
